name: Auto Merge

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event.review.state == 'approved'

    steps:
      - uses: actions/checkout@v4

      - name: Enable auto-merge if CI is green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Use same filtered set (excl. auto-merge) for both count and status checks
          FILTERED=$(gh pr view "$PR_NUMBER" --json statusCheckRollup -q '
            [.statusCheckRollup[] | select(.name != "auto-merge")]
          ')
          CHECK_COUNT=$(echo "$FILTERED" | jq '. | length')
          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks found yet. Aborting auto-merge."
            exit 0
          fi

          STATUS=$(echo "$FILTERED" | jq -r '
            .[]
            | . as $c
            | select(
                if $c.status != null then
                  ($c.status != "COMPLETED" or ($c.conclusion != "SUCCESS" and $c.conclusion != "SKIPPED" and $c.conclusion != "NEUTRAL"))
                else
                  ($c.state != "SUCCESS" and $c.state != "NEUTRAL")
                end
              )
            | .name
          ')

          if [ -n "$STATUS" ]; then
            echo "Some checks still failing or pending:"
            echo "$STATUS"
            echo "Auto-merge not enabled."
            exit 0
          fi

          echo "All checks passed. Enabling auto-merge (squash)..."
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
