name: Auto Merge

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event.review.state == 'approved'

    steps:
      - uses: actions/checkout@v4

      - name: Enable auto-merge if CI is green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          CHECK_COUNT=$(gh pr view "$PR_NUMBER" --json statusCheckRollup -q '.statusCheckRollup | length')
          if [ "$CHECK_COUNT" -eq 0 ]; then
            echo "No CI checks found yet. Aborting auto-merge."
            exit 0
          fi

          STATUS=$(gh pr view "$PR_NUMBER" --json statusCheckRollup -q '.statusCheckRollup[] | select(.status != "COMPLETED" or (.status == "COMPLETED" and .conclusion != "SUCCESS" and .conclusion != "SKIPPED")) | .name')

          if [ -n "$STATUS" ]; then
            echo "Some checks still failing or pending:"
            echo "$STATUS"
            echo "Auto-merge not enabled."
            exit 0
          fi

          echo "All checks passed. Enabling auto-merge (squash)..."
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch
