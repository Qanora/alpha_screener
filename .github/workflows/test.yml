name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install ruff "mypy>=1.15,<2" types-requests
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy alphascreener/
      - run: mypy tests/

  bandit:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit
      - run: bandit -r alphascreener/ -ll

  vulture:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install vulture
      - run: vulture alphascreener/ --min-confidence 80 --ignore-names cls

  commit-msg:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate issue references in commits
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          invalid=$(git log --format="%H %s" "$base..$head" | grep -vE '#[0-9]+' || true)
          if [ -n "$invalid" ]; then
            echo "BLOCKED: every commit must reference an issue (e.g. '#1', 'closes #2')."
            echo "Offending commits:"
            echo "$invalid"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -e . --no-deps
          # Extract runtime deps from pyproject.toml (skip tradingagents — numpy conflict)
          python3 -c "
          import tomllib
          with open('pyproject.toml','rb') as f:
              deps = tomllib.load(f)['project']['dependencies']
          for d in deps:
              if 'tradingagents' not in d:
                  print(d)
          " | xargs -d '\n' pip install
          # Dev deps for testing
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v
